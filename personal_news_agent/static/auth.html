<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册登录 · 个人资讯助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-shell">
    <main class="auth-page">
      <section class="auth-card-panel auth-entry-panel">
        <h1>个人资讯助手</h1>
        <section class="auth-panel active" data-auth-panel="login">
          <h2>登录</h2>
          <form id="loginForm" class="form-grid">
            <input name="username" autocomplete="username" placeholder="用户名" required />
            <input name="password" autocomplete="current-password" type="password" placeholder="密码" required />
            <button>登录</button>
          </form>
          <p id="loginStatus" class="status" aria-live="polite"></p>
          <p class="auth-switch">还没有账号？<button type="button" class="auth-link" data-auth-mode-target="register">注册</button></p>
        </section>
        <section class="auth-panel" data-auth-panel="register" hidden>
          <h2>注册</h2>
          <form id="registerForm" class="form-grid">
            <input name="username" autocomplete="username" placeholder="用户名" required />
            <input name="password" autocomplete="new-password" type="password" placeholder="密码，至少6位" required />
            <input name="confirm_password" autocomplete="new-password" type="password" placeholder="确认密码" required />
            <input name="real_name" autocomplete="name" placeholder="真实姓名" required />
            <input name="mobile" autocomplete="tel" placeholder="手机号实名认证，请用真实姓名对应的手机号" required />
            <button>注册</button>
          </form>
          <p id="registerStatus" class="status" aria-live="polite"></p>
          <p class="auth-switch">已有账号？<button type="button" class="auth-link" data-auth-mode-target="login">登录</button></p>
        </section>
      </section>
    </main>
    <script src="/static/shared.js"></script>
    <script src="/static/auth.js"></script>
  </body>
</html>
