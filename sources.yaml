sources:
  - source_id: people_politics
    name: 人民网时政
    root_domain: politics.people.com.cn
    source_type: portal
    priority: 1
    crawl_enabled: true
    search_enabled: true
    categories: [politics]
    tags: [politics, domestic, official, state_media]
    crawl_interval_minutes: 45
    sections:
      - key: politics
        name: 人民网时政
        category: politics
        url: https://politics.people.com.cn/index1.html
        crawl_strategy: list_page
        tags: [domestic, policy]
    search:
      strategy: external_first
      domain_filters: [politics.people.com.cn, people.com.cn]
      native_search_enabled: true
      api_requests:
        - method: POST
          url: http://search.people.cn/search-platform/front/search
          json: {key: "{query}", page: 1, limit: 10}
          results_path: data.records
          title_field: title
          url_field: url
          snippet_field: content
    rate_limit: {min_interval_seconds: 5, max_pages_per_run: 30}
